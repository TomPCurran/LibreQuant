[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "librequant"
version = "0.1.0"
description = "Local-first data access for LibreQuant notebooks and strategies"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pandas>=2.0",
  "pyarrow>=14.0",
  "python-dotenv>=1.0",
  "yfinance>=0.2.40",
  "requests>=2.31",
  "openpyxl>=3.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["librequant"]

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 100
target-version = "py311"
